<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PIM IM</title>
</head>
<body>
  <script>
    (function redirect() {
      try {
        const raw = localStorage.getItem("pim_auth");
        if (raw) {
          const parsed = JSON.parse(raw);
          if (parsed && parsed.token) {
            location.replace("./im.html");
            return;
          }
        }
      } catch (_) {}
      location.replace("./login.html");
    })();
  </script>
</body>
</html>
