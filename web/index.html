<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>PIM 聊天 Demo</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #0f172a; color: #e5e7eb; }
    .app { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
    header { padding: 12px 20px; border-bottom: 1px solid #1f2937; display: flex; justify-content: space-between; align-items: center; }
    header h1 { margin: 0; font-size: 18px; }
    header small { color: #9ca3af; }
    main { flex: 1; display: flex; min-height: 0; }
    .sidebar { width: 260px; border-right: 1px solid #1f2937; padding: 12px; display: flex; flex-direction: column; gap: 12px; background: #020617; min-height: 0; overflow-y: auto; }
    .section-title { font-size: 12px; text-transform: uppercase; letter-spacing: .08em; color: #6b7280; margin-bottom: 4px; }
    .card { background: #020617; border: 1px solid #1f2937; border-radius: 10px; padding: 10px; }
    label { font-size: 12px; color: #9ca3af; display: block; margin-bottom: 4px; }
    input, button, textarea { font-family: inherit; }
    input, textarea { width: 100%; padding: 6px 8px; border-radius: 6px; border: 1px solid #1f2937; background: #020617; color: #e5e7eb; font-size: 13px; }
    input:focus, textarea:focus { outline: none; border-color: #38bdf8; box-shadow: 0 0 0 1px #0ea5e933; }
    button { padding: 6px 10px; border-radius: 999px; border: none; font-size: 13px; cursor: pointer; background: #38bdf8; color: #0b1120; font-weight: 500; }
    button.secondary { background: #111827; color: #e5e7eb; border: 1px solid #374151; }
    button:disabled { opacity: .5; cursor: not-allowed; }
    .row { display: flex; gap: 8px; }
    .row > div { flex: 1; }
    .status-pill { font-size: 11px; padding: 3px 8px; border-radius: 999px; background: #111827; color: #9ca3af; }
    .status-pill.ok { color: #22c55e; background: #052e16; }
    .status-pill.err { color: #f97316; background: #451a03; }

    .content { flex: 1; display: flex; flex-direction: column; min-height: 0; }
    .content-top { padding: 10px 16px; border-bottom: 1px solid #1f2937; display: flex; justify-content: space-between; align-items: center; }
    .content-main { flex: 1; display: flex; min-height: 0; }

    .friends-panel { width: 220px; border-right: 1px solid #1f2937; padding: 10px; overflow-y: auto; }
    .friends-list { margin-top: 6px; display: flex; flex-direction: column; gap: 4px; }
    .friend-item { padding: 6px 8px; border-radius: 8px; cursor: pointer; font-size: 13px; display: flex; justify-content: space-between; align-items: center; }
    .friend-item:hover { background: #020617; }
    .friend-item.active { background: #0f172a; border: 1px solid #1d4ed8; }

    .chat-panel { flex: 1; display: flex; flex-direction: column; min-height: 0; }
    .messages { flex: 1; padding: 10px 14px 18px; overflow-y: auto; background: #020617; }
    .msg { margin-bottom: 8px; max-width: 70%; padding: 6px 10px; border-radius: 10px; font-size: 13px; line-height: 1.4; }
    .msg.me { margin-left: auto; background: #1d4ed8; color: #e5e7eb; border-bottom-right-radius: 2px; }
    .msg.other { margin-right: auto; background: #111827; color: #e5e7eb; border-bottom-left-radius: 2px; }
    .msg-meta { font-size: 11px; color: #9ca3af; margin-top: 2px; }

    .composer { padding: 8px 12px; border-top: 1px solid #1f2937; background: #020617; display: flex; flex-direction: column; gap: 6px; }
    .composer-row { display: flex; gap: 8px; }
    .composer-row input { flex: 1; }

    .log { font-size: 11px; max-height: 80px; overflow-y: auto; padding: 6px 8px; border-radius: 6px; background: #020617; border: 1px solid #1f2937; color: #9ca3af; white-space: pre-wrap; }
  </style>
</head>
<body>
<div class="app">
  <header>
    <div>
      <h1>PIM 聊天 Demo</h1>
      <small>通过 Gateway(8080) 调用 User/Friend/Conversation 服务</small>
    </div>
    <div id="headerUser" style="font-size: 13px; color:#9ca3af;">
      未登录
    </div>
  </header>

  <main>
    <aside class="sidebar">
      <div class="card">
        <div class="section-title">注册 / 登录</div>
        <div class="row">
          <div>
            <label>用户名</label>
            <input id="regUsername" placeholder="new user" />
          </div>
          <div>
            <label>密码</label>
            <input id="regPassword" type="password" placeholder="password" />
          </div>
        </div>
        <button id="registerBtn" style="margin-top:6px; width:100%;">注册</button>

        <hr style="border:none; border-top:1px solid #1f2937; margin:10px 0;" />

        <div class="row">
          <div>
            <label>用户名</label>
            <input id="loginUsername" placeholder="user" />
          </div>
          <div>
            <label>密码</label>
            <input id="loginPassword" type="password" placeholder="password" />
          </div>
        </div>
        <button id="loginBtn" style="margin-top:6px; width:100%;">登录</button>
        <div style="margin-top:6px; font-size:11px; color:#9ca3af;" id="authInfo"></div>
      </div>

      <div class="card">
        <div class="section-title">当前状态</div>
        <div style="display:flex; flex-direction:column; gap:4px; font-size:12px;">
          <div>HTTP：<span id="apiStatus" class="status-pill">未检测</span></div>
          <div>WS：<span id="wsStatus" class="status-pill">未连接</span></div>
        </div>
        <button id="pingBtn" class="secondary" style="margin-top:8px; width:100%;">检查 /health</button>
      </div>

      <div class="card">
        <div class="section-title">好友</div>
        <label>发送好友申请（对方用户 ID）</label>
        <div class="row">
          <input id="addFriendId" type="number" placeholder="2" />
          <button id="addFriendBtn" class="secondary">申请</button>
        </div>
        <button id="loadFriendReqBtn" class="secondary" style="margin-top:6px; width:100%;">刷新申请中心</button>
        <button id="clearFriendReqBtn" class="secondary" style="margin-top:6px; width:100%;">清空本地提醒</button>
        <div class="friends-list" id="friendRequestList"></div>
        <div class="friends-list" id="outgoingRequestList"></div>
        <button id="loadFriendsBtn" style="margin-top:6px; width:100%;">刷新好友列表</button>
        <div class="friends-list" id="friendsList"></div>
      </div>

      <div class="card">
        <div class="section-title">最近会话</div>
        <div class="friends-list" id="conversationList"></div>
      </div>

      <div class="card">
        <div class="section-title">调试日志</div>
        <div class="log" id="debugLog"></div>
      </div>
    </aside>

    <section class="content">
      <div class="content-top">
        <div>
          <div style="font-size:13px;">当前对话：<span id="currentPeer">未选择</span></div>
          <div style="font-size:11px; color:#9ca3af; margin-top:2px;">选择左侧好友后，拉取历史消息并通过 WebSocket 收发</div>
        </div>
        <div>
          <button id="connectWsBtn" class="secondary">连接 WebSocket</button>
        </div>
      </div>

      <div class="content-main">
        <div class="friends-panel">
          <div class="section-title">好友列表</div>
          <div id="friendsListRight" class="friends-list"></div>
        </div>

        <div class="chat-panel">
          <div id="messages" class="messages"></div>
          <div class="composer">
            <div class="composer-row">
              <input id="peerIdInput" type="number" placeholder="手动填对方用户 ID（可选，通常通过选择好友）" />
            </div>
            <div class="composer-row">
              <input id="msgInput" placeholder="输入消息，回车发送" />
              <button id="sendMsgBtn">发送</button>
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>
</div>

<script>
  const API_BASE = "http://localhost:8080"; // 走 Gateway

  let authToken = null;
  let currentUser = null;
  let friends = [];
  let conversations = [];
  // 好友申请中心：incoming/outgoing 都来自后端接口（真相源）。
  let incomingFriendRequests = [];
  let outgoingFriendRequests = [];
  // 好友未读数映射：friend_id -> unread count
  let unreadMap = {};
  let currentPeerId = null;
  let ws = null;

  const el = (id) => document.getElementById(id);

  // 生成 client_msg_id：优先使用浏览器原生 UUID，兼容旧环境则用时间戳+随机数
  function generateClientMsgId() {
    if (window.crypto && crypto.randomUUID) {
      return crypto.randomUUID();
    }
    const t = Date.now().toString(36);
    const r = Math.random().toString(36).slice(2, 10);
    return `c_${t}_${r}`;
  }

  function setApiStatus(ok, msg) {
    const s = el('apiStatus');
    s.textContent = msg || (ok ? 'OK' : '错误');
    s.className = 'status-pill ' + (ok ? 'ok' : 'err');
  }

  function setWsStatus(status, ok) {
    const s = el('wsStatus');
    s.textContent = status;
    s.className = 'status-pill ' + (ok ? 'ok' : '');
  }

  function logDebug(msg) {
    const box = el('debugLog');
    const time = new Date().toLocaleTimeString();
    box.textContent += `[${time}] ${msg}\n`;
    box.scrollTop = box.scrollHeight;
  }

  function renderHeaderUser() {
    const h = el('headerUser');
    if (!currentUser) {
      h.textContent = '未登录';
    } else {
      h.textContent = `已登录：${currentUser.username} (ID: ${currentUser.id})`;
    }
  }

  function renderFriends() {
    const left = el('friendsList');
    const right = el('friendsListRight');
    left.innerHTML = '';
    right.innerHTML = '';
    friends.forEach(f => {
      const unread = unreadMap[f.friend_id] || 0;
      const label = unread > 0 ? `#${f.friend_id} (${unread})` : `#${f.friend_id}`;
      const node1 = document.createElement('div');
      node1.className = 'friend-item' + (currentPeerId === f.friend_id ? ' active' : '');
      node1.textContent = label;
      node1.onclick = () => selectPeer(f.friend_id);
      left.appendChild(node1);

      const node2 = document.createElement('div');
      node2.className = 'friend-item' + (currentPeerId === f.friend_id ? ' active' : '');
      node2.textContent = label;
      node2.onclick = () => selectPeer(f.friend_id);
      right.appendChild(node2);
    });
  }

  // 渲染“收到的好友申请”列表，支持直接同意/拒绝。
  function renderIncomingFriendRequests() {
    const box = el('friendRequestList');
    if (!box) return;
    box.innerHTML = '';
    const title = document.createElement('div');
    title.style.fontSize = '12px';
    title.style.color = '#9ca3af';
    title.textContent = '收到的申请';
    box.appendChild(title);

    if (!incomingFriendRequests.length) {
      const empty = document.createElement('div');
      empty.style.fontSize = '12px';
      empty.style.color = '#9ca3af';
      empty.textContent = '暂无待处理申请';
      box.appendChild(empty);
      return;
    }
    incomingFriendRequests.forEach(req => {
      const row = document.createElement('div');
      row.className = 'friend-item';
      row.style.flexDirection = 'column';
      row.style.alignItems = 'stretch';
      row.style.gap = '6px';

      const text = document.createElement('div');
      text.style.fontSize = '12px';
      text.textContent = `申请ID:${req.request_id} 来自用户#${req.from_user_id}` + (req.remark ? `（${req.remark}）` : '');
      row.appendChild(text);

      const btnRow = document.createElement('div');
      btnRow.className = 'row';
      const approveBtn = document.createElement('button');
      approveBtn.className = 'secondary';
      approveBtn.textContent = '同意';
      approveBtn.onclick = async () => {
        try {
          await apiRequest('/api/v1/friends/requests/' + encodeURIComponent(req.request_id) + '/approve', {
            method: 'POST',
          });
          logDebug('同意好友申请成功: request_id=' + req.request_id);
          await Promise.all([loadFriendRequestsCenter(), loadFriends()]);
        } catch (e) {
          logDebug('同意好友申请失败: ' + e.message);
          alert('同意好友申请失败: ' + e.message);
        }
      };

      const rejectBtn = document.createElement('button');
      rejectBtn.className = 'secondary';
      rejectBtn.textContent = '拒绝';
      rejectBtn.onclick = async () => {
        try {
          await apiRequest('/api/v1/friends/requests/' + encodeURIComponent(req.request_id) + '/reject', {
            method: 'POST',
          });
          logDebug('拒绝好友申请成功: request_id=' + req.request_id);
          await loadFriendRequestsCenter();
        } catch (e) {
          logDebug('拒绝好友申请失败: ' + e.message);
          alert('拒绝好友申请失败: ' + e.message);
        }
      };
      btnRow.appendChild(approveBtn);
      btnRow.appendChild(rejectBtn);
      row.appendChild(btnRow);
      box.appendChild(row);
    });
  }

  // 渲染“我发出的申请”列表（只读状态）。
  function renderOutgoingFriendRequests() {
    const box = el('outgoingRequestList');
    if (!box) return;
    box.innerHTML = '';
    const title = document.createElement('div');
    title.style.fontSize = '12px';
    title.style.color = '#9ca3af';
    title.textContent = '我发出的申请';
    box.appendChild(title);

    if (!outgoingFriendRequests.length) {
      const empty = document.createElement('div');
      empty.style.fontSize = '12px';
      empty.style.color = '#9ca3af';
      empty.textContent = '暂无记录';
      box.appendChild(empty);
      return;
    }
    outgoingFriendRequests.forEach(req => {
      const row = document.createElement('div');
      row.className = 'friend-item';
      row.style.cursor = 'default';
      row.textContent = `申请ID:${req.request_id} -> 用户#${req.to_user_id}（${req.status}）`;
      box.appendChild(row);
    });
  }

  // 渲染会话列表：按最近会话顺序展示 peer_id
  function renderConversations() {
    const box = el('conversationList');
    if (!box) return;
    box.innerHTML = '';
    conversations.forEach(conv => {
      const peerId = conv.peer_id;
      const node = document.createElement('div');
      node.className = 'friend-item' + (currentPeerId === peerId ? ' active' : '');
      let label = `会话 #${peerId}`;
      if (conv.last_message_at) {
        const t = new Date(conv.last_message_at * 1000).toLocaleTimeString();
        label += ` · ${t}`;
      }
      node.textContent = label;
      node.onclick = () => selectPeer(peerId);
      box.appendChild(node);
    });
  }

  function appendMessage(msg, isMe) {
    const box = el('messages');
    const wrap = document.createElement('div');
    wrap.className = 'msg ' + (isMe ? 'me' : 'other');
    wrap.textContent = msg.content;
    const meta = document.createElement('div');
    meta.className = 'msg-meta';
    meta.textContent = `${isMe ? '我' : '对方'} · ${new Date().toLocaleTimeString()}`;
    wrap.appendChild(document.createElement('br'));
    wrap.appendChild(meta);
    box.appendChild(wrap);
    box.scrollTop = box.scrollHeight;
  }

  function clearMessages() {
    el('messages').innerHTML = '';
  }

  async function apiRequest(path, options = {}) {
    const url = API_BASE + path;
    const headers = options.headers || {};
    if (authToken) {
      headers['Authorization'] = 'Bearer ' + authToken;
    }
    const resp = await fetch(url, {
      method: options.method || 'GET',
      headers: { 'Content-Type': 'application/json', ...headers },
      body: options.body ? JSON.stringify(options.body) : undefined,
    });
    const text = await resp.text();
    let data = null;
    try { data = text ? JSON.parse(text) : null; } catch(e) { data = null; }
    if (!resp.ok) {
      throw new Error(data && data.error ? data.error : `HTTP ${resp.status}`);
    }
    return data;
  }

  // 注册
  el('registerBtn').onclick = async () => {
    const username = el('regUsername').value.trim();
    const password = el('regPassword').value.trim();
    if (!username || !password) {
      alert('请输入用户名和密码');
      return;
    }
    try {
      const res = await apiRequest('/api/v1/register', {
        method: 'POST',
        body: { username, password },
      });
      logDebug('注册成功: ' + JSON.stringify(res));
      alert('注册成功，现在可以使用该账号登录');
    } catch (e) {
      logDebug('注册失败: ' + e.message);
      alert('注册失败: ' + e.message);
    }
  };

  // 登录
  el('loginBtn').onclick = async () => {
    const username = el('loginUsername').value.trim();
    const password = el('loginPassword').value.trim();
    if (!username || !password) {
      alert('请输入用户名和密码');
      return;
    }
    try {
      const res = await apiRequest('/api/v1/login', {
        method: 'POST',
        body: { username, password },
      });
      authToken = res.token;
      currentUser = res.user;
      renderHeaderUser();
      el('authInfo').textContent = '已获取 JWT token，后续请求自动携带';
      logDebug('登录成功: ' + JSON.stringify(res));

      // 登录后拉一次好友、会话和申请中心
      await Promise.all([loadFriends(), loadConversations(), loadFriendRequestsCenter()]);
    } catch (e) {
      logDebug('登录失败: ' + e.message);
      alert('登录失败: ' + e.message);
    }
  };

  // 检查 /health
  el('pingBtn').onclick = async () => {
    try {
      const res = await fetch(API_BASE + '/health');
      const ok = res.ok;
      setApiStatus(ok, ok ? '200 /health' : '错误');
      logDebug('GET /health -> ' + res.status);
    } catch (e) {
      setApiStatus(false, '连接失败');
      logDebug('GET /health 失败: ' + e.message);
    }
  };

  // 发送好友申请
  el('addFriendBtn').onclick = async () => {
    const idStr = el('addFriendId').value.trim();
    if (!idStr) {
      alert('请输入好友用户 ID');
      return;
    }
    try {
      const fid = Number(idStr);
      const res = await apiRequest('/api/v1/friends/requests', {
        method: 'POST',
        body: { to_user_id: fid, remark: '' },
      });
      const reqID = res && res.request_id ? res.request_id : '未知';
      logDebug(`好友申请已发送: to=${fid}, request_id=${reqID}`);
      await loadFriendRequestsCenter();
      alert(`好友申请已发送（申请ID: ${reqID}），等待对方同意`);
    } catch (e) {
      logDebug('发送好友申请失败: ' + e.message);
      alert('发送好友申请失败: ' + e.message);
    }
  };

  // 清空本地申请提醒（不影响后端数据）。
  el('clearFriendReqBtn').onclick = () => {
    incomingFriendRequests = [];
    outgoingFriendRequests = [];
    renderIncomingFriendRequests();
    renderOutgoingFriendRequests();
  };

  // 刷新申请中心。
  el('loadFriendReqBtn').onclick = () => {
    loadFriendRequestsCenter();
  };

  // 拉“收到的申请”列表（真相源）。
  async function loadIncomingFriendRequests() {
    const res = await apiRequest('/api/v1/friends/requests/incoming?status=pending&limit=20');
    incomingFriendRequests = res.items || [];
  }

  // 拉“发出的申请”列表（真相源）。
  async function loadOutgoingFriendRequests() {
    const res = await apiRequest('/api/v1/friends/requests/outgoing?limit=20');
    outgoingFriendRequests = res.items || [];
  }

  // 申请中心统一刷新入口。
  async function loadFriendRequestsCenter() {
    try {
      await Promise.all([loadIncomingFriendRequests(), loadOutgoingFriendRequests()]);
      renderIncomingFriendRequests();
      renderOutgoingFriendRequests();
      logDebug('申请中心已刷新');
    } catch (e) {
      logDebug('刷新申请中心失败: ' + e.message);
    }
  }

  // 拉好友列表
  async function loadFriends() {
    try {
      const res = await apiRequest('/api/v1/friends');
      friends = res.friends || [];
      renderFriends();
      logDebug('好友列表: ' + JSON.stringify(friends));
    } catch (e) {
      logDebug('获取好友列表失败: ' + e.message);
      alert('获取好友列表失败: ' + e.message);
    }
  }
  el('loadFriendsBtn').onclick = loadFriends;

  // 拉会话列表
  async function loadConversations() {
    try {
      const res = await apiRequest('/api/v1/conversations');
      conversations = res.conversations || [];
      renderConversations();
      logDebug('会话列表: ' + JSON.stringify(conversations));
    } catch (e) {
      logDebug('获取会话列表失败: ' + e.message);
    }
  }

  // 选择好友，拉历史
  async function selectPeer(peerId) {
    currentPeerId = peerId;
    el('currentPeer').textContent = peerId ? ('用户 #' + peerId) : '未选择';
    el('peerIdInput').value = peerId || '';
    renderFriends();
    clearMessages();
    if (!peerId) return;
    try {
      const res = await apiRequest('/api/v1/messages?with=' + encodeURIComponent(peerId));
      const msgs = res.messages || [];
      const unread = res.unread || 0;
      // 当前会话已读，清空本地未读
      unreadMap[peerId] = 0;
      renderFriends();
      msgs.forEach(m => {
        const isMe = currentUser && m.from_user_id === currentUser.id;
        appendMessage({ content: m.content }, isMe);
      });
      // 拉完历史后再上报已读；即使上报失败也不影响历史消息展示
      try {
        await apiRequest('/api/v1/conversations/' + encodeURIComponent(peerId) + '/read', {
          method: 'PUT',
        });
      } catch (e) {
        logDebug('已读上报失败: ' + e.message);
      }
      // 已读后刷新会话列表，保证 last_seq / last_message_at 与后端一致
      loadConversations();
      logDebug(`拉取历史消息 ${msgs.length} 条 with=${peerId}，未读=${unread}`);
    } catch (e) {
      logDebug('获取历史消息失败: ' + e.message);
      alert('获取历史消息失败: ' + e.message);
    }
  }

  // 连接 WebSocket
  el('connectWsBtn').onclick = () => {
    if (!authToken) {
      alert('请先登录以获取 token');
      return;
    }
    if (ws && ws.readyState === WebSocket.OPEN) {
      alert('WebSocket 已连接');
      return;
    }
    const wsUrl = `ws://localhost:8080/ws?token=${encodeURIComponent(authToken)}`;
    ws = new WebSocket(wsUrl);
    ws.onopen = () => {
      setWsStatus('已连接', true);
      logDebug('WebSocket 已连接');
    };
    ws.onclose = () => {
      setWsStatus('已断开', false);
      logDebug('WebSocket 已断开');
    };
    ws.onerror = (e) => {
      setWsStatus('错误', false);
      logDebug('WebSocket 错误（见控制台）');
      console.error(e);
    };
    ws.onmessage = (evt) => {
      try {
        const data = JSON.parse(evt.data);
        if (data.error) {
          logDebug('WS 错误消息: ' + data.error);
          alert('WS 错误: ' + data.error);
          return;
        }
        const from = data.from;
        const content = data.content;
        // 系统事件：好友申请实时通知（Gateway 推送）。
        if (from === 0 && typeof content === 'string') {
          try {
            const sysEvt = JSON.parse(content);
            if (sysEvt && (sysEvt.type === 'friend_request_created' || sysEvt.type === 'friend_request_updated')) {
              logDebug(`收到好友申请事件: ${sysEvt.type}, request_id=${sysEvt.request_id || ''}, status=${sysEvt.status || ''}`);
              loadFriendRequestsCenter();
              return;
            }
          } catch (_) {
            // 非系统事件则继续按普通聊天消息处理
          }
        }
        if (!currentPeerId || currentPeerId !== from) {
          // 若不是当前会话：记未读 + 提示
          unreadMap[from] = (unreadMap[from] || 0) + 1;
          renderFriends();
          // 收到新消息后刷新会话列表（最近会话顺序、时间）
          loadConversations();
          logDebug(`收到来自 ${from} 的消息（非当前会话，未读=${unreadMap[from]}）: ${content}`);
        } else {
          appendMessage({ content }, false);
          loadConversations();
          return;
        }
        // 非当前会话，不自动渲染到聊天窗口，只做提示
      } catch (e) {
        logDebug('WS 收到非 JSON: ' + evt.data);
      }
    };
  };

  // 发送消息
  async function sendMessage() {
    if (!ws || ws.readyState !== WebSocket.OPEN) {
      alert('WebSocket 尚未连接');
      return;
    }
    const content = el('msgInput').value.trim();
    if (!content) return;
    let peerId = currentPeerId;
    const manual = el('peerIdInput').value.trim();
    if (manual) peerId = Number(manual);
    if (!peerId) {
      alert('请先选择好友或填对方用户 ID');
      return;
    }

    // 每次点击发送按钮视为一条新消息，生成新的 client_msg_id
    const clientMsgId = generateClientMsgId();

    const payload = {
      to: Number(peerId),
      content,
      client_msg_id: clientMsgId,
    };
    ws.send(JSON.stringify(payload));
    appendMessage({ content }, true);
    el('msgInput').value = '';
    logDebug('WS 发送: ' + JSON.stringify(payload));

    // 发送消息后刷新会话列表
    loadConversations();
  }

  el('sendMsgBtn').onclick = sendMessage;
  el('msgInput').addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  // 初始的小提示
  logDebug('1. 先用 user-service 的账号在这里注册/登录');
  logDebug('2. 登录后先点“刷新申请中心”可查看收/发申请');
  logDebug('3. B 保持 WebSocket 在线，可实时收到申请事件');
  logDebug('4. 同意/拒绝后会自动刷新申请中心和好友列表');
  renderIncomingFriendRequests();
  renderOutgoingFriendRequests();
</script>
</body>
</html>
