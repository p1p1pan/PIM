worker_processes auto;

events {
  worker_connections 4096;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;
  sendfile on;

  upstream pim_gateway_http {
    least_conn;
    server host.docker.internal:26080 max_fails=3 fail_timeout=10s;
    server host.docker.internal:26180 max_fails=3 fail_timeout=10s;
    keepalive 256;
  }

  upstream pim_observe_http {
    server host.docker.internal:26280 max_fails=3 fail_timeout=10s;
    keepalive 32;
  }

  map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
  }

  server {
    listen 18080;
    server_name _;
    # 与 docker-compose 中挂载的 PIM/web 一致，使 http://宿主机:28080/ 打开统一入口（见 web/index.html）
    root /usr/share/nginx/html;
    index index.html;

    # 故障演练等写操作仍走 gateway；必须放在 /api/v1/admin/ 通配之前（含无尾斜杠路径）。
    location ^~ /api/v1/admin/observability/drill {
      proxy_pass http://pim_gateway_http;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /api/v1/admin/file-scan/ {
      proxy_pass http://pim_gateway_http;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 只读 admin + 日志查询由 observe-service 提供。
    location /api/v1/admin/ {
      proxy_pass http://pim_observe_http;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /api/v1/logs/ {
      proxy_pass http://pim_observe_http;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
      proxy_pass http://pim_gateway_http;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /ws {
      proxy_pass http://pim_gateway_http/ws;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 300s;
      proxy_send_timeout 300s;
    }

    # 其余路径为静态资源；根路径显式落到入口页
    location = / {
      try_files /index.html =404;
    }
    location / {
      try_files $uri $uri/ =404;
    }
  }
}
