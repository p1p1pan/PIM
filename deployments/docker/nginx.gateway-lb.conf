worker_processes auto;

events {
  worker_connections 4096;
}

http {
  upstream pim_gateway_http {
    least_conn;
    server host.docker.internal:8080 max_fails=3 fail_timeout=10s;
    server host.docker.internal:8180 max_fails=3 fail_timeout=10s;
    keepalive 256;
  }

  map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
  }

  server {
    listen 18080;
    server_name _;

    location /api/ {
      proxy_pass http://pim_gateway_http;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /ws {
      proxy_pass http://pim_gateway_http/ws;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 300s;
      proxy_send_timeout 300s;
    }

    location / {
      return 200 "pim gateway lb ok\n";
      add_header Content-Type text/plain;
    }
  }
}
