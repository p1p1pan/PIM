global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules/pim-alert-rules.yml

scrape_configs:
  - job_name: pim-gateway
    static_configs:
      - targets: ["host.docker.internal:8080"]

  - job_name: pim-auth-service
    static_configs:
      - targets: ["host.docker.internal:9000"]
    metrics_path: /metrics

  - job_name: pim-user-service
    static_configs:
      - targets: ["host.docker.internal:9001"]
    metrics_path: /metrics

  - job_name: pim-friend-service
    static_configs:
      - targets: ["host.docker.internal:9002"]
    metrics_path: /metrics

  - job_name: pim-conversation-service
    static_configs:
      - targets: ["host.docker.internal:9003"]
    metrics_path: /metrics

  - job_name: pim-group-service
    static_configs:
      - targets: ["host.docker.internal:9004"]
    metrics_path: /metrics

  - job_name: pim-file-service
    static_configs:
      - targets: ["host.docker.internal:9006"]
    metrics_path: /metrics

  - job_name: pim-log-service
    static_configs:
      - targets: ["host.docker.internal:9016"]
    metrics_path: /metrics
