services:
  etcd:
    image: quay.io/coreos/etcd:v3.5.21
    container_name: pim-etcd
    restart: unless-stopped
    command:
      - /usr/local/bin/etcd
      - --name=pim0
      - --listen-client-urls=http://0.0.0.0:2379
      - --advertise-client-urls=http://127.0.0.1:2379
      - --listen-peer-urls=http://0.0.0.0:2380
      - --initial-advertise-peer-urls=http://127.0.0.1:2380
      - --initial-cluster=pim0=http://127.0.0.1:2380
    ports:
      - "2379:2379"

  postgres:
    image: postgres:16-alpine
    container_name: pim-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: pim
      POSTGRES_PASSWORD: pim
      POSTGRES_DB: pim
    ports:
      - "55432:5432"
    volumes:
      - pim_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pim -d pim"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: pim-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - pim_redisdata:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: pim-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: pim-kafka
    restart: unless-stopped
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      # 双 listener：宿主机进程用 localhost:9092；Docker 内其它容器用 kafka:29092。
      # 若只 advertised localhost，容器内客户端会先连上 kafka:9092，但元数据返回 localhost，导致在容器内连错机（你看到的 AdminClient WARN）。
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      # 自动创建 topic 时默认 1 分区会严重限制消费并行；显式建 topic 由 kafka-init 完成。
      KAFKA_NUM_PARTITIONS: 8

  # 预热 Kafka topic（多分区），避免仅依赖 auto-create 导致 im-message 等只有 1 分区、吞吐上不去。
  kafka-init:
    image: confluentinc/cp-kafka:7.5.0
    container_name: pim-kafka-init
    depends_on:
      - kafka
    restart: "no"
    entrypoint: ["/bin/bash", "-lc"]
    command:
      - |
        set -e
        until kafka-broker-api-versions --bootstrap-server kafka:29092 >/dev/null 2>&1; do sleep 1; done
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic im-message --partitions 64 --replication-factor 1
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic im-message-push --partitions 64 --replication-factor 1
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic im-message-read --partitions 16 --replication-factor 1
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic log-topic --partitions 16 --replication-factor 1
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic group-message --partitions 64 --replication-factor 1
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic group-member-sync --partitions 16 --replication-factor 1
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic file-scan --partitions 8 --replication-factor 1
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic file-scan-dlq --partitions 2 --replication-factor 1
        kafka-topics --bootstrap-server kafka:29092 --list

  minio:
    image: minio/minio:latest
    container_name: pim-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: pimminio
      MINIO_ROOT_PASSWORD: pimminiopass
    command: server /data --console-address ":9001"
    ports:
      - "19000:9000"
      - "19001:9001"
    volumes:
      - pim_miniodata:/data

  minio-init:
    image: minio/mc:latest
    container_name: pim-minio-init
    depends_on:
      - minio
    restart: "no"
    entrypoint: /bin/sh -c
    command: >
      "
      until mc alias set local http://minio:9000 pimminio pimminiopass; do sleep 1; done &&
      mc mb --ignore-existing local/pim-files &&
      cat > /tmp/cors.json <<'EOF'
      {
        \"CORSRules\": [
          {
            \"AllowedOrigins\": [\"http://localhost:26080\", \"http://localhost:28080\"],
            \"AllowedMethods\": [\"GET\", \"PUT\", \"HEAD\"],
            \"AllowedHeaders\": [\"*\"],
            \"ExposeHeaders\": [\"ETag\", \"Content-Length\", \"Content-Type\"],
            \"MaxAgeSeconds\": 3600
          }
        ]
      }
      EOF
      &&
      mc cors set local/pim-files /tmp/cors.json
      "

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.2
    container_name: pim-elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - pim_esdata:/usr/share/elasticsearch/data

  kibana:
    image: docker.elastic.co/kibana/kibana:8.15.2
    container_name: pim-kibana
    restart: unless-stopped
    depends_on:
      - elasticsearch
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: pim-prometheus
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    volumes:
      - ../observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ../observability/pim-alert-rules.yml:/etc/prometheus/rules/pim-alert-rules.yml:ro
      - pim_prometheusdata:/prometheus
    ports:
      - "9090:9090"
    extra_hosts:
      - "host.docker.internal:host-gateway"

  grafana:
    image: grafana/grafana:11.2.2
    container_name: pim-grafana
    restart: unless-stopped
    depends_on:
      - prometheus
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ../observability/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ../observability/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ../observability/grafana/dashboards:/var/lib/grafana/dashboards/pim:ro
      - pim_grafanadata:/var/lib/grafana
    ports:
      - "3000:3000"

  gateway-lb:
    image: nginx:1.27-alpine
    container_name: pim-gateway-lb
    restart: unless-stopped
    ports:
      - "28080:18080"
    volumes:
      - ../docker/nginx.gateway-lb.conf:/etc/nginx/nginx.conf:ro

volumes:
  pim_pgdata:
  pim_redisdata:
  pim_miniodata:
  pim_esdata:
  pim_prometheusdata:
  pim_grafanadata: