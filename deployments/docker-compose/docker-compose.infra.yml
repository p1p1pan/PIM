services:
  postgres:
    image: postgres:16-alpine
    container_name: pim-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: pim
      POSTGRES_PASSWORD: pim
      POSTGRES_DB: pim
    ports:
      - "5432:5432"
    volumes:
      - pim_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pim -d pim"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: pim-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - pim_redisdata:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: pim-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: pim-kafka
    restart: unless-stopped
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0

  minio:
    image: minio/minio:latest
    container_name: pim-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: pimminio
      MINIO_ROOT_PASSWORD: pimminiopass
    command: server /data --console-address ":9001"
    ports:
      - "19000:9000"
      - "19001:9001"
    volumes:
      - pim_miniodata:/data

  minio-init:
    image: minio/mc:latest
    container_name: pim-minio-init
    depends_on:
      - minio
    restart: "no"
    entrypoint: /bin/sh -c
    command: >
      "
      until mc alias set local http://minio:9000 pimminio pimminiopass; do sleep 1; done &&
      mc mb --ignore-existing local/pim-files &&
      cat > /tmp/cors.json <<'EOF'
      {
        \"CORSRules\": [
          {
            \"AllowedOrigins\": [\"http://localhost:8080\"],
            \"AllowedMethods\": [\"GET\", \"PUT\", \"HEAD\"],
            \"AllowedHeaders\": [\"*\"],
            \"ExposeHeaders\": [\"ETag\", \"Content-Length\", \"Content-Type\"],
            \"MaxAgeSeconds\": 3600
          }
        ]
      }
      EOF
      &&
      mc cors set local/pim-files /tmp/cors.json
      "

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.2
    container_name: pim-elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - pim_esdata:/usr/share/elasticsearch/data

  kibana:
    image: docker.elastic.co/kibana/kibana:8.15.2
    container_name: pim-kibana
    restart: unless-stopped
    depends_on:
      - elasticsearch
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: pim-prometheus
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    volumes:
      - ../observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ../observability/pim-alert-rules.yml:/etc/prometheus/rules/pim-alert-rules.yml:ro
      - pim_prometheusdata:/prometheus
    ports:
      - "9090:9090"
    extra_hosts:
      - "host.docker.internal:host-gateway"

  grafana:
    image: grafana/grafana:11.2.2
    container_name: pim-grafana
    restart: unless-stopped
    depends_on:
      - prometheus
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ../observability/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ../observability/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ../observability/grafana/dashboards:/var/lib/grafana/dashboards/pim:ro
      - pim_grafanadata:/var/lib/grafana
    ports:
      - "3000:3000"

volumes:
  pim_pgdata:
  pim_redisdata:
  pim_miniodata:
  pim_esdata:
  pim_prometheusdata:
  pim_grafanadata: