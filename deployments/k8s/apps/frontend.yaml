apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: pim
spec:
  type: NodePort
  selector:
    app: frontend
  ports:
    - name: http
      port: 8088
      targetPort: 8088
      nodePort: 30088
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: pim
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      initContainers:
        - name: wait-gateway
          image: busybox:1.36
          command: ["sh", "-c", "until nc -z gateway 8080; do sleep 2; done"]
      containers:
        - name: frontend
          image: pim/frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8088
              name: http
          readinessProbe:
            httpGet:
              path: /
              port: 8088
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 8088
            initialDelaySeconds: 20
          resources:
            requests:
              cpu: 20m
              memory: 32Mi
            limits:
              memory: 128Mi
