apiVersion: v1
kind: Service
metadata:
  name: file-service
  namespace: pim
spec:
  selector:
    app: file-service
  ports:
    - name: grpc
      port: 9015
      targetPort: 9015
    - name: http
      port: 9006
      targetPort: 9006
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: file-service
  namespace: pim
spec:
  replicas: 1
  selector:
    matchLabels:
      app: file-service
  template:
    metadata:
      labels:
        app: file-service
    spec:
      initContainers:
        - name: wait-deps
          image: busybox:1.36
          command:
            - sh
            - -c
            - until nc -z postgres 5432 && nc -z kafka 9092 && nc -z minio 9000 && nc -z group-service 9014 && nc -z friend-service 9012; do sleep 2; done
      containers:
        - name: file-service
          image: pim/file-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: grpc
              containerPort: 9015
            - name: http
              containerPort: 9006
          envFrom:
            - configMapRef:
                name: pim-runtime
            - secretRef:
                name: pim-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: 9006
          livenessProbe:
            httpGet:
              path: /health
              port: 9006
            initialDelaySeconds: 30
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              memory: 512Mi
