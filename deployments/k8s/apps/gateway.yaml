apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: pim
spec:
  type: NodePort
  selector:
    app: gateway
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      nodePort: 30808
    - name: push-grpc
      port: 8090
      targetPort: 8090
---
apiVersion: v1
kind: Service
metadata:
  name: gateway-headless
  namespace: pim
spec:
  clusterIP: None
  selector:
    app: gateway
  ports:
    - name: http
      port: 8080
      targetPort: 8080
    - name: push-grpc
      port: 8090
      targetPort: 8090
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: gateway
  namespace: pim
spec:
  serviceName: gateway-headless
  podManagementPolicy: Parallel
  replicas: 2
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      initContainers:
        - name: wait-deps
          image: busybox:1.36
          command:
            - sh
            - -c
            - until nc -z redis 6379 && nc -z kafka 9092 && nc -z auth-service 9005 && nc -z user-service 9011 && nc -z friend-service 9012 && nc -z conversation-service 9013 && nc -z group-service 9014 && nc -z file-service 9015 && nc -z log-service 9016; do sleep 2; done
      containers:
        - name: gateway
          image: pim/gateway:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
            - name: push-grpc
              containerPort: 8090
          envFrom:
            - configMapRef:
                name: pim-runtime
            - secretRef:
                name: pim-secrets
          env:
            - name: GATEWAY_NODE_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              memory: 512Mi
