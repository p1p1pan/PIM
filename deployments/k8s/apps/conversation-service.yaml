apiVersion: v1
kind: Service
metadata:
  name: conversation-service
  namespace: pim
spec:
  selector:
    app: conversation-service
  ports:
    - name: grpc
      port: 9013
      targetPort: 9013
    - name: http
      port: 9003
      targetPort: 9003
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: conversation-service
  namespace: pim
spec:
  replicas: 3
  selector:
    matchLabels:
      app: conversation-service
  template:
    metadata:
      labels:
        app: conversation-service
    spec:
      initContainers:
        - name: wait-deps
          image: busybox:1.36
          command:
            - sh
            - -c
            - until nc -z postgres 5432 && nc -z redis 6379 && nc -z kafka 9092 && nc -z etcd 2379; do sleep 2; done
      containers:
        - name: conversation-service
          image: pim/conversation-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: grpc
              containerPort: 9013
            - name: http
              containerPort: 9003
          envFrom:
            - configMapRef:
                name: pim-runtime
            - secretRef:
                name: pim-secrets
          env:
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: SERVICE_INSTANCE_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          readinessProbe:
            httpGet:
              path: /health
              port: 9003
          livenessProbe:
            httpGet:
              path: /health
              port: 9003
            initialDelaySeconds: 30
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              memory: 512Mi
