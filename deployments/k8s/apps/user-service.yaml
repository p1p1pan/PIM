apiVersion: v1
kind: Service
metadata:
  name: user-service
  namespace: pim
spec:
  selector:
    app: user-service
  ports:
    - name: grpc
      port: 9011
      targetPort: 9011
    - name: http
      port: 9001
      targetPort: 9001
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: pim
spec:
  replicas: 2
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      initContainers:
        - name: wait-postgres
          image: busybox:1.36
          command: ["sh", "-c", "until nc -z postgres 5432 && nc -z etcd 2379; do sleep 2; done"]
      containers:
        - name: user-service
          image: pim/user-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: grpc
              containerPort: 9011
            - name: http
              containerPort: 9001
          envFrom:
            - configMapRef:
                name: pim-runtime
            - secretRef:
                name: pim-secrets
          env:
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: SERVICE_INSTANCE_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          readinessProbe:
            httpGet:
              path: /health
              port: 9001
          livenessProbe:
            httpGet:
              path: /health
              port: 9001
            initialDelaySeconds: 15
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 256Mi
