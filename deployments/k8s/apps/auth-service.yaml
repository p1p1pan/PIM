apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: pim
spec:
  selector:
    app: auth-service
  ports:
    - name: grpc
      port: 9005
      targetPort: 9005
    - name: http
      port: 9000
      targetPort: 9000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: pim
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      initContainers:
        - name: wait-deps
          image: busybox:1.36
          command: ["sh", "-c", "until nc -z redis 6379 && nc -z user-service 9011; do sleep 2; done"]
      containers:
        - name: auth-service
          image: pim/auth-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: grpc
              containerPort: 9005
            - name: http
              containerPort: 9000
          envFrom:
            - configMapRef:
                name: pim-runtime
            - secretRef:
                name: pim-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: 9000
          livenessProbe:
            httpGet:
              path: /health
              port: 9000
            initialDelaySeconds: 15
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 256Mi
