# 开发/演示用明文 Secret；生产请改为 SealedSecrets/ExternalSecrets 等。
apiVersion: v1
kind: Secret
metadata:
  name: pim-secrets
  namespace: pim
type: Opaque
stringData:
  POSTGRES_PASSWORD: pim
  JWT_SECRET: pim-dev-secret-k8s
  REDIS_PASSWORD: ""
  MINIO_ROOT_PASSWORD: pimminiopass
  MINIO_SECRET_KEY: pimminiopass
