apiVersion: batch/v1
kind: Job
metadata:
  name: minio-init-bucket
  namespace: pim
spec:
  backoffLimit: 8
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: minio-mc
          image: minio/mc:latest
          env:
            - name: MINIO_ROOT_USER
              value: pimminio
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: pim-secrets
                  key: MINIO_ROOT_PASSWORD
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -e
              until mc alias set local http://minio:9000 "$MINIO_ROOT_USER" "$MINIO_ROOT_PASSWORD"; do sleep 2; done
              mc mb --ignore-existing local/pim-files
              echo ok
