syntax = "proto3";

package conversation.v1;

option go_package = "pim/internal/conversation/pb;pbconversation";

service ConversationService {
  rpc ListMessages(ListMessagesRequest) returns (ListMessagesResponse);
  rpc SendMessage(SendMessageRequest) returns (SendMessageResponse);
  rpc ListConversations(ListConversationsRequest) returns (ListConversationsResponse);
}

message ListMessagesRequest {
  uint64 user_id = 1;   // 当前用户
  uint64 other_id = 2;  // 对方用户（与 user_id 之间的历史消息）
}

message ListMessagesResponse {
  repeated Message messages = 1;
}

message SendMessageRequest {
  uint64 from_user_id = 1;
  uint64 to_user_id = 2;
  string content = 3;
}

message SendMessageResponse {
  Message message = 1;
}

message Message {
  uint64 id = 1;
  uint64 from_user_id = 2;
  uint64 to_user_id = 3;
  string content = 4;
  int64 created_at = 5;
}

message ListConversationsRequest {
  uint64 user_id = 1;
}
message ConversationSummary {
  uint64 id              = 1;
  uint64 user_a          = 2;
  uint64 user_b          = 3;
  uint64 last_message_id = 4;
  uint64 last_seq        = 5;
  int64  last_message_at = 6; // unix 秒
}
message ListConversationsResponse {
  repeated ConversationSummary conversations = 1;
}